name: 🚀 Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PNPM_VERSION: '9'
  NODE_VERSION: '20'

jobs:
  # ─── Deploy API to Railway ───────────────────────────────────────────
  deploy-api:
    name: 🖥️ Deploy API → Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API
        run: railway up --service lotos-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ─── Deploy Landing to Vercel ────────────────────────────────────────
  deploy-landing:
    name: 🌐 Deploy Landing → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Landing
        run: npx vercel --yes --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/landing

  # ─── Deploy Mini App to Vercel ───────────────────────────────────────
  deploy-miniapp:
    name: 📱 Deploy Mini App → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Mini App
        run: npx vercel --yes --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/miniapp

  # ─── Deploy Admin to Vercel ──────────────────────────────────────────
  deploy-admin:
    name: 🛠️ Deploy Admin → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Admin
        run: npx vercel --yes --prod --token ${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin
